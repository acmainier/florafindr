<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — FloraFindr</title>
</head>
<body>

  <header>
    <p class="brand-logo"><a href="index.html">FloraFindr<span>.</span></a></p>
    <nav aria-label="Primary">
      <ul>
        <li><a href="about.html">About This Project</a></li>
        <li><a href="contact.html">Submit a plant</a></li>
      </ul>
    </nav>
</header>

   <main>

        <section class="contact-page">
            <h1>Get in Touch</h1>
        </section>

        <section>
            <label for="contact-wrap" class="contact-wrap">

                <address>
                    <h2>Contact Information</h2>
                    <p>Pop us a message and we'll get back to you.</p>
                    <br>
                    <strong>Address</strong><br>
                    XXX XXXXXXX XXXXXXXX XXXX, XXXXXX, XXXXXXX, XX XXX<br>
                    </br>
                    <strong>Phone</strong><br>
                    <a href="">+44 XXXXXXXXXXX</a><br>
                    Monday–Friday, 9am–5pm
                    <br><br>
                    <strong>Email</strong><br>
                    <a href="">hello@florafindr.co.uk</a>
                </address>

                <form action="#" method="post">
                    <h2>Send a Message</h2>

                    <fieldset>
                        <label for="name" class="required">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your name">
                    </fieldset>

                    <fieldset>
                        <label for="email" class="required">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </fieldset>

                    <fieldset>
                        <label for="phone">Phone Number (optional)</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                    </fieldset>

                    <fieldset>
                        <label for="message" class="required">Your Message</label>
                        <textarea id="message" name="message" required placeholder="Enter your message"></textarea>
                    </fieldset>

                    <button type="submit">Send Message</button>

                </form>

            </label>
        </section>

    </main>
