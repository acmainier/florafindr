<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloraFindr — Find your Flora</title>
  </head>
  <body>
    <header>
      <p class="brand-logo">
        <a href="index.html">FloraFindr<span>.</span></a>
      </p>
      <nav aria-label="Primary">
        <ul>
          <li><a href="about.html">About This Project</a></li>
          <li><a href="contact.html">Submit a plant</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="main-page">
        <h1 class="Page-title">FloraFindr<span>.</span></h1>
        <p class="tagline">A searchable Flora guide</p>
      </section>

      <search class="specimen">
        <form
          role="search"
          aria-label="Search the plant catalog"
          id="searchForm"
        >
          <data class="tag" value=""></data>
          <input
            id="searchInput"
            type="text"
            placeholder="Search by common or scientific name…"
            autocomplete="on"
            role="combobox"
            aria-expanded="false"
            aria-controls="suggestList"
            aria-autocomplete="list"
          />
          <button type="submit" class="go-btn" aria-label="Search">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
          <ul class="suggest-list" id="suggestList" role="listbox" hidden></ul>
        </form>
        <menu class="actions">
          <li>
            <button type="button" id="randomFloraBtn" class="btn accent">
              Feeling leafy
            </button>
          </li>
        </menu>
      </search>

      <article class="chips" id="chips">
        <button class="chip" data-cat="All">All</button>
        <button class="chip" data-cat="Houseplants">Houseplants</button>
        <button class="chip" data-cat="Succulents">Succulents</button>
        <button class="chip" data-cat="Ferns">Ferns</button>
        <button class="chip" data-cat="Trees">Trees</button>
        <button class="chip" data-cat="Herbs">Herbs</button>
      </article>

      <section class="results" id="results">
        <label class="results-label" id="resultsLabel">Specimens</label>
        <p class="grid" id="resultsGrid"></p>
      </section>
    </main>

    <footer>
      <nav>
        <a href="about.html"><h3>About The Project</h3></a>
      </nav>
      <nav>
        <a href="team.html"><h3>Meet The Team</h3></a>
      </nav>
      <nav>
        <a href="contact.html"><h3>Contact</h3></a>
      </nav>
      <p class="copyright-footer">&copy; 2026 FloraFindr Ltd.</p>
    </footer>
  </body>
  <script src="assets/script/script.js"></script>
</html>
